<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumè — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0f;
    --surface:   #16161a;
    --border:    #2a2a32;
    --accent:    #5865F2;
    --accent-h:  #4752C4;
    --text:      #e8e8f0;
    --muted:     #6b6b80;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(88,101,242,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,101,242,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPan 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridPan { from { background-position: 0 0; } to { background-position: 40px 40px; } }

  /* Glowing orb */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(88,101,242,.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:.6; transform: translate(-50%,-50%) scale(1); }
                     50%      { opacity:1;   transform: translate(-50%,-50%) scale(1.08); } }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 380px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
    animation: slideUp .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }

  .logo {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: .85rem;
    margin-bottom: 36px;
  }

  .btn-discord {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 24px rgba(88,101,242,.35);
  }
  .btn-discord:hover {
    background: var(--accent-h);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(88,101,242,.5);
  }
  .btn-discord svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

  .error-note {
    margin-top: 20px;
    font-size: .8rem;
    color: #e05260;
    display: none;
  }
  .error-note.show { display: block; }

  .footer {
    margin-top: 32px;
    font-size: .75rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lumè</div>
  <div class="subtitle">Bot Dashboard — Sign in to continue</div>

  <a class="btn-discord" href="/auth/discord" id="loginBtn">
    <svg viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg">
      <path d="M60.1 4.9A58.5 58.5 0 0 0 45.5.4a.2.2 0 0 0-.2.1 40.7 40.7 0 0 0-1.8 3.7 53.9 53.9 0 0 0-16.2 0A37.8 37.8 0 0 0 25.5.5a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.7 4.9a.2.2 0 0 0-.1.1C1.6 18.1-.9 31 .3 43.7a.3.3 0 0 0 .1.2 58.8 58.8 0 0 0 17.7 9 .2.2 0 0 0 .2-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.7 38.7 0 0 1-5.5-2.6.2.2 0 0 1 0-.4 30 30 0 0 0 1.1-.9.2.2 0 0 1 .2 0c11.5 5.3 24 5.3 35.3 0a.2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .4 36.2 36.2 0 0 1-5.5 2.6.2.2 0 0 0-.1.3 47.2 47.2 0 0 0 3.6 5.9.2.2 0 0 0 .2.1 58.6 58.6 0 0 0 17.7-9 .3.3 0 0 0 .1-.2c1.5-15.4-2.5-28.3-10.3-40a.2.2 0 0 0-.1-.1zM23.7 35.9c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2z"/>
    </svg>
    Continue with Discord
  </a>

  <div class="error-note" id="errorNote"></div>

  <div class="footer">Lumè Bot Dashboard · Alexander</div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    const note = document.getElementById('errorNote');
    note.textContent = err === 'no_code' ? 'Login cancelled.' : 'Authentication failed. Try again.';
    note.classList.add('show');
  }
</script>
</body>
</html>
